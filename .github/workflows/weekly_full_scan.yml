name: Weekly Full Scan

on:
  schedule:
    - cron: '0 4 * * 6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      TZ: Europe/Madrid

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full screener (clear cache)
        run: python screener.py --clear-cache

      - name: Commit results
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add results/ .config_hash
          git diff --staged --quiet || git commit -m "Weekly full scan: $(date -u +%Y-%m-%d)"
          git push
