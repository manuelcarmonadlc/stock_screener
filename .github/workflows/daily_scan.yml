name: Daily Stock Scan

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      TZ: Europe/Madrid

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screener (full scan)
        run: python screener.py

      - name: Commit results
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add -f results/ .config_hash
          git diff --staged --quiet || git commit -m "Auto-scan: $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
